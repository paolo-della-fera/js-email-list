<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark">

    <!-- Header -->
    <header class="py-5">
        <div class="container d-flex justify-content-center">

            <div class="p-4 rounded-4 shadow-sm bg-white text-center">
                <h1 class="fw-bold display-6 text-danger mb-3">
                    Email Generator
                </h1>
                <p class="text-secondary mb-0">
                    Generate 10 random email addresses instantly
                </p>
            </div>

        </div>
    </header>

    <!-- Main -->
    <main>

        <!-- Contenitore con la lista di email -->
        <div class="container d-flex justify-content-center">
            <div class="card shadow-lg p-4 w-50">
                <ul id="email-list" class="list-group list-group-flush">
                </ul>
            </div>
        </div>
        <div class="d-flex justify-content-center mt-4">
            <button id="btn" class="btn btn-outline-primary btn-lg">
                🚀  Genera nuove email
            </button>
        </div>

    </main>

    
    <script src="main.js"></script>
</body>

</html>
